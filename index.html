<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#080705">
    <meta name="description" content="OZK TOBACCO منصة خدمة عملاء عربية تعمل على Windows وApple.">
    <link rel="manifest" href="public/manifest.webmanifest">
    <link rel="icon" href="public/icons/app-icon.png" type="image/png">
    <link rel="stylesheet" href="src/styles.css?v=tobacco-35">
    <title>OZK TOBACCO | خدمة العملاء</title>
  </head>
  <body>
    <div id="app"></div>
    <script>
      (() => {
        const selector = "input[name='salePrice'], input[name='creditLimit'], input[name='lowThreshold']";
        const arabicDigits = "٠١٢٣٤٥٦٧٨٩";
        const persianDigits = "۰۱۲۳۴۵۶۷۸۹";
        const normalizeNumber = (value, input) => {
          const allowDecimal = input?.name !== "lowThreshold";
          let text = String(value || "")
            .replace(/[٠-٩]/g, (digit) => String(arabicDigits.indexOf(digit)))
            .replace(/[۰-۹]/g, (digit) => String(persianDigits.indexOf(digit)))
            .replace(/[٫،]/g, ".")
            .replace(/\s+/g, "");

          const commaCount = (text.match(/,/g) || []).length;
          if (allowDecimal && !text.includes(".") && commaCount === 1) {
            const [, decimalPart = ""] = text.split(",");
            if (/^\d{1,2}$/.test(decimalPart)) text = text.replace(",", ".");
          }

          text = text.replace(/,/g, "").replace(/[^\d.]/g, "");
          if (!allowDecimal) return text.replace(/\./g, "");

          const parts = text.split(".");
          text = `${parts.shift() || ""}${parts.length ? `.${parts.join("")}` : ""}`;
          return text.startsWith(".") ? `0${text}` : text;
        };

        const prepareInputs = (root = document) => {
          root.querySelectorAll?.(selector).forEach((input) => {
            if (input.type !== "text") input.type = "text";
            input.inputMode = input.name === "lowThreshold" ? "numeric" : "decimal";
            input.dir = "ltr";
            const normalized = normalizeNumber(input.value, input);
            if (normalized !== input.value) input.value = normalized;
          });
        };

        document.addEventListener(
          "input",
          (event) => {
            if (!event.target?.matches?.(selector)) return;
            const input = event.target;
            const normalized = normalizeNumber(input.value, input);
            if (normalized !== input.value) input.value = normalized;
          },
          true
        );

        document.addEventListener("submit", () => prepareInputs(document), true);
        new MutationObserver(() => prepareInputs(document)).observe(document.documentElement, { childList: true, subtree: true });
        prepareInputs(document);
      })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" defer></script>
    <script src="public/vendor/html2pdf.bundle.min.js" defer></script>
    <script src="src/config.js?v=tobacco-35" defer></script>
    <script src="src/supabase-client.js?v=tobacco-35" defer></script>
    <script src="src/app.js?v=tobacco-35" defer></script>
  </body>
</html>

name: Deploy TOBACCO Web

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run project check
        run: npm run check

  deploy:
    needs: check
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      # المحاولة الأولى — لا نُفشل الوظيفة فوراً كي نعيد المحاولة عند عثرة GitHub المؤقتة
      - name: Deploy
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4

      # عند فشل مؤقّت («Deployment failed, try again later») ننتظر قليلاً ثم نعيد المحاولة مرة واحدة
      - name: Wait before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 20

      - name: Deploy (retry)
        id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4

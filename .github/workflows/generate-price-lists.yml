name: توليد نشرات الأسعار

on:
  push:
    branches: [main]
    paths:
      - 'scripts/price-data.json'
  workflow_dispatch:
    inputs:
      rate:
        description: 'سعر صرف الليرة السورية مقابل الدولار'
        required: false
        type: string
  schedule:
    # يتجدّد تلقائياً من الأسعار الحيّة في Supabase كل 3 ساعات (بدون لابتوب)
    - cron: '0 */3 * * *'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Generate price list HTML
        env:
          SYP_RATE: ${{ inputs.rate || '' }}
        run: node scripts/generate-price-lists.mjs

      - name: Generate PDFs
        run: node scripts/generate-pdfs.mjs

      - name: Bump service worker cache version
        run: |
          FILE="public/service-worker.js"
          CURRENT=$(grep -o 'v[0-9]*"' "$FILE" | tr -d '"v')
          NEW=$((CURRENT + 1))
          sed -i "s/v${CURRENT}\"/v${NEW}\"/" "$FILE"
          echo "Cache bumped: v${CURRENT} → v${NEW}"

      - name: Commit generated files
        run: |
          git config user.name  "price-bot"
          git config user.email "action@github.com"
          git add public/downloads/ public/service-worker.js scripts/exchange-rate.json
          git diff --staged --quiet && echo "لا تغييرات" && exit 0
          STAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          # هذا الدفع يجب أن يشغّل pages.yml حتى تصل الأسعار الجديدة للموقع فوراً.
          # لا تستخدم [skip ci] هنا؛ مسار push أعلاه محصور بملف price-data فلا توجد حلقة توليد.
          git commit -m "Auto: تحديث نشرات الأسعار — ${STAMP}"
          git push
